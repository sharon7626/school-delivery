<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校園外送｜聯絡我們</title>
    <link rel="stylesheet" href="../css/base.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html">校園外送</a>
      <nav aria-label="主要導覽">
        <a href="restaurants.html">餐廳</a>
        <a href="menu.html">菜單</a>
        <a href="cart.html">購物車 <span data-cart-count>0</span></a>
        <a href="order-status.html">訂單狀態</a>
        <a href="profile.html">會員中心</a>
        <a href="contact.html">聯絡我們</a>
      </nav>
    </header>
    <main class="container">
      <section class="page-heading">
        <p class="eyebrow">需要協助嗎？</p>
        <h1>聯絡我們</h1>
        <p class="muted">訂單或平台使用上有任何問題，歡迎透過以下方式聯絡。</p>
      </section>

      <section class="panel" aria-labelledby="support-title">
        <h2 id="support-title">客服資訊</h2>
        <div class="grid">
          <article class="card">
            <h3>服務時間</h3>
            <p>星期一至星期五 09:00–18:00</p>
          </article>
          <article class="card">
            <h3>客服信箱</h3>
            <p><a href="mailto:support@example.com">support@example.com</a></p>
          </article>
          <article class="card">
            <h3>問題處理</h3>
            <p><a href="#faq">查看常見問題</a></p>
          </article>
        </div>
      </section>

      <section id="faq" class="panel" aria-labelledby="faq-title">
        <h2 id="faq-title">常見問題</h2>
        <h3>如何查看外送進度？</h3>
        <p>前往「訂單狀態」頁面，即可查看每筆訂單目前的配送進度。</p>
        <h3>下單後想修改或取消訂單？</h3>
        <p>請來信客服信箱並附上訂單編號，我們會盡快為你處理。</p>
        <a class="button" href="order-status.html">查看訂單狀態</a>
      </section>
    </main>
    <footer>© 2026 校園外送</footer>
    <script src="../js/app.js"></script>
  </body>
</html>
